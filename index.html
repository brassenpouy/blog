<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — brassenpouy</title>
<link rel="stylesheet" href="./assets/index.css">
</head>
<body>
<div class="container">
  <h1>Blog</h1>
  <p class="subtitle">技术分析与行业洞察</p>
  <ul class="post-list" id="postList">
    <li class="empty-state">加载中…</li>
  </ul>
</div>
<script>
  fetch('./assets/posts.json')
    .then(r => r.json())
    .then(posts => {
      const list = document.getElementById('postList');
      if (!posts.length) {
        list.innerHTML = '<li class="empty-state">暂无文章</li>';
        return;
      }
      posts.sort((a, b) => b.date.localeCompare(a.date));
      list.innerHTML = posts.map(p => `
        <li class="post-item">
          <a href="./${p.slug}/">
            <div class="post-date">${p.date}</div>
            <div class="post-title">${p.title}</div>
            <div class="post-desc">${p.description}</div>
            <div class="post-tags">
              ${p.tags.map(t => `<span class="post-tag">${t}</span>`).join('')}
            </div>
          </a>
        </li>
      `).join('');
    })
    .catch(() => {
      document.getElementById('postList').innerHTML =
        '<li class="empty-state">加载失败，请刷新重试</li>';
    });
</script>
</body>
</html>
